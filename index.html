<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aleena Jolly - Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #ffffff;
            background: linear-gradient(to top, #2b0040, #8a2be2);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 20px 60px;
            font-size: 0.95rem;
        }

        header nav a {
            margin-left: 24px;
            text-decoration: none;
            color: #e0d4ff;
            letter-spacing: 0.05em;
        }

        header nav a:hover {
            color: #ffffff;
            text-decoration: underline;
        }

        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px 60px;
            position: relative;
        }

        .hero-title {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            font-weight: 400;
            opacity: 0.9;
            margin-bottom: 40px;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
        }

        .scroll-circle {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1px solid #ffffff;
            margin-bottom: 8px;
        }

        @media (max-width: 768px) {
            header {
                justify-content: center;
                padding: 16px 20px;
            }

            header nav a {
                margin-left: 14px;
                font-size: 0.85rem;
            }

            .hero-title {
                font-size: 2.1rem;
            }

            .hero-subtitle {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#projects">Projects</a>
            <a href="#portfolio">Portfolio</a>
            <a href="#blog">Blog</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <section class="hero" id="home">
        <h1 class="hero-title">Aleena Jolly</h1>
        <p class="hero-subtitle">Learning &amp; creating new stuff</p>

        <div class="scroll-indicator">
            <div class="scroll-circle"></div>
            <span>SCROLL</span>
        </div>
    </section>
</body>
</html>
